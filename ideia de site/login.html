<!DOCTYPE html>
<html lang="pt-BR">
 <head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Login | Catálogo de Filmes</title>
 <link rel="stylesheet" href="style.css" />
 </head>
 <body class="auth-body">
 <main class="auth-main">
 <section class="auth-card">
 <div class="auth-copy">
 <p class="eyebrow">Acesso Exclusivo</p>
 <h1>Bem-vindo de volta ao CodeFlix</h1>
 <p>
     Acesse sua conta para gerenciar seu catálogo, salvar seus filmes favoritos 
     e receber recomendações personalizadas baseadas no seu gosto.
 </p>
 </div>
 <form id="loginForm" class="auth-form" novalidate>
 <label>
 <span>Usuário</span>
 <input type="text" id="username" name="username" placeholder="Digite o usuário" />
 <small class="field-error" id="usernameError"></small>
 </label>
 <label>
 <span>Senha</span>
 <input type="password" id="password" name="password" placeholder="Digite a senha" />
 <small class="field-error" id="passwordError"></small>
 </label>
 <button class="button primary auth-button" type="submit">Entrar na Conta</button>
                
                <p id="loginFeedback" class="form-feedback"></p>
                <p class="signup-link">Não tem uma conta? <a href="#">Cadastre-se</a></p>
 </section>
 </main>
 <script src="login.js"></script>
 </body>
</html>
    </main>
    <script src="login.js"></script>
</body>
</html>
